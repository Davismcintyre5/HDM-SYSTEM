<h2>Payment Receipt</h2>
<table style="width:100%; border-collapse:collapse;">
  <tr><td style="padding:8px; font-weight:bold;">Student</td><td>{{studentName}} ({{regNumber}})</td></tr>
  <tr><td style="padding:8px; font-weight:bold;">Amount Paid</td><td style="color:#059669; font-weight:bold;">KES {{amount}}</td></tr>
  <tr><td style="padding:8px; font-weight:bold;">Balance</td><td style="color:#dc2626;">KES {{balance}}</td></tr>
  <tr><td style="padding:8px; font-weight:bold;">Date</td><td>{{date}}</td></tr>
</table>
