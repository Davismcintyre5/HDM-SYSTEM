<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
    .container { max-width: 600px; margin: 20px auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: #1a56db; color: #fff; padding: 30px; text-align: center; }
    .body { padding: 30px; color: #333; line-height: 1.6; }
    .footer { background: #f8f9fa; padding: 20px; text-align: center; font-size: 12px; color: #6b7280; }
    .btn { display: inline-block; background: #1a56db; color: #fff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: bold; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 20px 0; }
    blockquote { border-left: 4px solid #1a56db; margin: 16px 0; padding: 8px 16px; background: #f0f4ff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>{{APP_NAME}}</h1>
    </div>
    <div class="body">
      {{CONTENT}}
    </div>
    <div class="footer">
      <p>&copy; {{YEAR}} {{APP_NAME}}. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
